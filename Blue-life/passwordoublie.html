<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dossiers css/passwordoublie.css">
    <title>Passwordoublié</title>
</head>
<body>
    <header>
        <nav>
            <i class="fas fa-password">Rénitialisation du mot de passe</i>
        </nav>
    </header>
    <main>
        <div class="formulaire">
            <form method="POST" action="mail.html">
                <label for="mail">Email</label><br>
                <input type="email" placeholder="entrer votre addresse mail" value="mail" required><br>
                <button type="submit" class="connecter" required >Se connecter</button>
            </form>
        </div>
    </main>
</body>
</html>
