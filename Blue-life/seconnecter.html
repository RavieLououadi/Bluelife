<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Blue Life</title>
    <meta name="description" content="Connectez-vous à votre compte Blue Life pour accéder à nos services de santé mentale">
    <link rel="stylesheet" href="dossiers css/seconnecter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo">
                <a href="accueil.html"><span>Blue</span>life</a>
            </div>
            
            <h1>Se connecter</h1>
            <p>Accédez à votre espace personnel</p>
            
            <form action="dossiers php/connexion.php" method="post" class="login-form">
                <div class="form-group">
                    <label for="mail">Adresse email</label>
                    <input type="email" id="mail" name="mail" placeholder="votre@email.com" required>
                    <i class="fas fa-envelope icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="motdepasse">Mot de passe</label>
                    <input type="password" id="motdepasse" name="motdepasse" placeholder="Votre mot de passe" required>
                    <i class="fas fa-lock icon"></i>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember" required>
                        Se souvenir de moi
                    </label>
                    <a href="passwordoublie.html" class="forgot-password">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="btn-login" >Se connecter</button>
                    
                
            </form>
            
            <div class="divider">
                <span>ou</span>
            </div>
            
            <div class="register-link">
                <p>&copy; Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>
            </div>
        </div>
    </div>
</body>
</html>
