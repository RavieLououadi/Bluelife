<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation</title>
</head>
<body>
    <h1>Rendez-vous confirmé</h1>
    <p>Merci ! Votre rendez-vous a bien été pris en compte.</p>
    <p id="service"></p>
    <p><a href="index.html">Retour à l'accueil</a></p>
    <script>
        // Optionnel : afficher le service sélectionné si passé en paramètre
        const params = new URLSearchParams(window.location.search);
        const service = params.get('service');
        if (service) {
            document.getElementById('service').textContent = 'Service choisi : ' + service;
        }
    </script>
</body>
</html>
